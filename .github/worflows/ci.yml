name: CI Backend


on:

  push:

    branches:
      - main


  pull_request:

    branches:
      - main



jobs:


  test:


    runs-on: ubuntu-latest



    steps:


      - name: Baixar codigo

        uses: actions/checkout@v4



      - name: Configurar Node

        uses: actions/setup-node@v4

        with:

          node-version: 20



      - name: Instalar dependencias

        working-directory: backend

        run: npm install



      - name: Rodar testes

        working-directory: backend

        run: npm test